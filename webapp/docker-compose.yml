services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: euaiact_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-euaiact}
      POSTGRES_USER: ${POSTGRES_USER:-euaiact_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-euaiact_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-euaiact_user} -d ${POSTGRES_DB:-euaiact}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - euaiact_network

  # Backend API (Node.js + Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: euaiact_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-euaiact_user}:${POSTGRES_PASSWORD:-euaiact_secure_password}@postgres:5432/${POSTGRES_DB:-euaiact}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - euaiact_network

  # Frontend (React + Vite - production uses nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: euaiact_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - euaiact_network

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: euaiact_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - euaiact_network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  euaiact_network:
    driver: bridge
